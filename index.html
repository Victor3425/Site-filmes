<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jornada Romântica</title>

  <!-- cache busting -->
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<div class="progress-wrapper">
  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>
  <p id="progress-text">0% concluído</p>
</div>

<div class="container">
  <h1>🎬 Jornada Romântica</h1>

  <h2>Séries</h2>
  <div class="grid">

    <div class="card">
      <img src="https://m.media-amazon.com/images/M/MV5BNjE5YTVlMzAtZDM3Zi00NjdhLWIyODctMTUzMmU1Mzc0OGQ2XkEyXkFqcGc@._V1_.jpg">
      <h3>Anne with an “E”</h3>
      <div class="seasons">
        <button class="season">T1</button>
        <button class="season">T2</button>
        <button class="season">T3</button>
      </div>
    </div>

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/71LerBMyOLL._AC_UF1000,1000_QL80_.jpg">
      <h3>Sweet Tooth</h3>
      <div class="seasons">
        <button class="season">T1</button>
        <button class="season">T2</button>
      </div>
    </div>

  </div>

  <h2>Filmes</h2>
  <div class="grid">

    <div class="card">
      <img src="https://br.web.img2.acsta.net/pictures/16/02/03/19/11/303307.jpg">
      <h3>Como Eu Era Antes de Você</h3>
      <button class="season">Assistido</button>
    </div>

    <div class="card">
      <img src="https://media.fstatic.com/anKVquLuvYqmWQUGSut7p_vSG0c=/322x478/smart/filters:format(webp)/media/movies/covers/2019/04/AAAABQr629iFfXp0VdUiRJHrrW9zxwkY98MEaEEyaNFIQjhiajmOMS4EV33gibA3QE_WkUT69K.jpg">
      <h3>O Date Perfeito</h3>
      <button class="season">Assistido</button>
    </div>

  </div>
</div>

<script src="script.js?v=3"></script>
</body>
</html>
